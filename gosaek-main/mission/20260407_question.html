<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>애니메이션</title>
<style>
    @keyframes quest {
        0% {margin-left: 0px; margin-right: 98%;}
        50% {margin-left: 98%; margin-right: 0px;}
        100% {margin-left: 0px; margin-right: 98%;}
    }
    p {
        animation-name: quest;
        animation-duration: 1s;
        animation-iteration-count: infinite;
    }
</style>

</head>
<body>
<h3>애니메이션 응용</h3>
