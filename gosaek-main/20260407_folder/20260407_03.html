<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>절대 배치</title>

<style>
    div {display: inline-block;
        position: absolute;
        border: 1px solid lightgray;

    }
    div > p {
        display: inline-block;
        position: absolute;
        height: 20px;
        width: 15px;
        background: lightgray;
    }
    /* #fixed {
        position: fixed;
        bottom: 10px;
        right: 10px;
        width: 100px;
        padding: 5px;
        background: red;
        color: white;
    } */
     #fixed {
        float: right;
        border: 1px solid black;
        width: 8em;
        padding: 0.25em;
        margin: 1em;
     }
</style>

</head>

<body>

<h3>Merry Christmas!</h3>

<hr>

<p id="fixed">예수님이 탄생하셨습니다.</p>

<div>

	<img src="../image/christmastree.png"
			width="200" height="200" alt="크리스마스 트리">
	<p style="left:50px; top:30px">M</p>
	<p style="left:100px; top:0px">E</p>
	<p style="left:100px; top:80px">R</p>
	<p style="left:150px; top:110px">R</p>
	<p style="left:30px; top:130px">Y</p>

</div>

</body>

</html>
