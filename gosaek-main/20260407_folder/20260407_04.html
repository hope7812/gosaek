<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>z-index 프로퍼티</title>

<style>
    div{position:absolute;}
    img {position: absolute;}
    #spadeA{z-index: -3; left:10px; top: 20px;}
    #spade2{z-index: 2; left:40px; top: 30px;}
    #spade3{z-index: 3; left:70px; top: 40px;}
    #spade7{z-index: 4; left:100px; top: 50px;}


</style>

</head>

<body>

<h3>z-index 프로퍼티</h3>

<hr>

<div>

	<img id="spadeA" src="../image/spade_A.png"

		width="100" height="140" alt="스페이드A">

	<img id="spade2" src="../image/spade_2.png"

		width="100" height="140" alt="스페이드2">

	<img id="spade3" src="../image/spade_3.png"

		width="100" height="140" alt="스페이드3">

	<img id="spade7" src="../image/spade_7.png"

		width="100" height="140" alt="스페이드7">

</div>

</body>

</html>
